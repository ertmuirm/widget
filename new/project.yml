name: IOSMirror
options:
  bundleIdPrefix: com.zeroflash
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  IOSMirror:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror
        PRODUCT_NAME: IOSMirror
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: IOSMirror
        CFBundleName: IOSMirror
        CFBundleIdentifier: com.iosmirror
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: IOSMirror
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
    dependencies:
      - target: IOSMirrorExtension
        embed: true

  IOSMirrorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror
        PRODUCT_NAME: IOSMirrorExtension
        INFOPLIST_FILE: Widget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: IOSMirror
        CFBundleName: IOSMirrorExtension
        CFBundleIdentifier: com.iosmirror
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: XPC!
        CFBundleExecutable: IOSMirrorExtension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  IOSMirror:
    build:
      targets:
        IOSMirror: all
        IOSMirrorExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release