name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - new

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: app_code
      
      - name: Clean previous builds
        run: |
          rm -rf app_code/new/build app_code/new/*.ipa Payload/ 2>/dev/null || true
          rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
      
      - name: Read version
        run: |
          if [ -f "app_code/new/App/Info.plist" ]; then
            VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" app_code/new/App/Info.plist 2>/dev/null || echo "1.0.0")
            BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" app_code/new/App/Info.plist 2>/dev/null || echo "1")
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "BUILD=$BUILD" >> $GITHUB_OUTPUT
            echo "Building Widget v${VERSION} (${BUILD})"
          else
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
            echo "BUILD=1" >> $GITHUB_OUTPUT
          fi
      
      - name: Create directory structure
        run: |
          cd app_code/new
          mkdir -p App Widget
          ls -la
      
      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          xcodegen --version
      
      - name: Generate Xcode Project
        run: |
          cd app_code/new
          xcodegen generate 2>&1
          ls -la *.xcodeproj 2>/dev/null || echo "xcodeproj not found"
      
      - name: Build Widget App
        run: |
          cd app_code/new
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.zeroflash.widget \
            clean build 2>&1 | tail -30 || echo "Build attempt complete"
      
      - name: Package as IPA
        run: |
          cd app_code/new
          
          # Find the built app
          APP_PATH=""
          for dir in "build" "DerivedData"; do
            if [ -d "$dir" ]; then
              APP_PATH=$(find "$dir" -name "Widget.app" -type d 2>/dev/null | head -1)
              [ -n "$APP_PATH" ] && break
            fi
          done
          
          echo "Found app at: $APP_PATH"
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            chmod +x Payload/Widget.app/Widget 2>/dev/null || true
            
            # Check for widget extension
            if [ -d "Payload/Widget.app/PlugIns" ]; then
              find Payload/Widget.app/PlugIns -name "WidgetExtension" -exec chmod +x {} \; 2>/dev/null || true
            fi
            
            cd Payload
            zip -r ../Widget.ipa Widget.app
            cd ..
            
            ls -la Widget.ipa
            echo "IPA size: $(du -h Widget.ipa | cut -f1)"
          else
            echo "Error: Could not find built app"
            find . -name "*.app" -type d 2>/dev/null
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null || echo "No app found"
            exit 1
          fi
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30