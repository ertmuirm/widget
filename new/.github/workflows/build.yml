name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - new

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen --version
      
      - name: Generate Xcode Project
        run: |
          cd new
          xcodegen generate
          ls -la
      
      - name: List Available Simulators
        run: |
          xcrun simctl list devices available | head -20
      
      - name: Build Widget App
        run: |
          cd new
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.zeroflash.widget \
            build 2>&1 | tail -50
      
      - name: Check Build Status
        run: |
          cd new
          if [ -d "build/Release-iphoneos" ]; then
            echo "Build artifacts found"
            ls -la build/Release-iphoneos/
          elif [ -d "build/Build/Products/Release-iphoneos" ]; then
            echo "Build artifacts found in Products"
            ls -la build/Build/Products/Release-iphoneos/
          else
            echo "Looking for build output..."
            find build -name "*.app" -type d 2>/dev/null
          fi
      
      - name: Package as IPA
        run: |
          # Find the built app
          APP_PATH=""
          for dir in "build/Release-iphoneos" "build/Build/Products/Release-iphoneos" "DerivedData"; do
            if [ -d "$dir" ]; then
              find "$dir" -name "*.app" -type d 2>/dev/null | head -1
            fi
          done
          
          # Create Payload structure
          mkdir -p Payload
          
          # Try to find app from DerivedData if xcodebuild used it
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -type d 2>/dev/null | head -1)
          fi
          
          echo "Found app at: $APP_PATH"
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
            chmod +x Payload/Widget.app/Widget 2>/dev/null || true
            chmod +x Payload/Widget.app/PlugIns/*/WidgetExtension 2>/dev/null || true
            
            # Create zip
            cd Payload
            zip -r ../Widget.ipa Widget.app
            cd ..
            
            ls -la Widget.ipa
            echo "IPA size: $(du -h Widget.ipa | cut -f1)"
          else
            echo "Error: Could not find built app"
            exit 1
          fi
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30