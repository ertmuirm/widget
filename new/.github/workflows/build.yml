name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - new

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Debug - list files
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          echo "---"
          ls -la new/ 2>/dev/null || echo "No new/ folder"
      
      - name: Install XcodeGen
        run: |
          brew install xcodegen || true
          xcodegen --version
      
      - name: Generate Xcode Project
        run: |
          cd new
          xcodegen generate
          ls -la
      
      - name: Build
        run: |
          cd new
          xcodebuild -project Widget.xcodeproj \
            -scheme IOSMirror \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.iosmirror \
            build 2>&1 | tail -40
      
      - name: Check for app and package
        run: |
          cd new
          APP=$(find . -name "IOSMirror.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP"
          
          if [ -d "$APP" ]; then
            mkdir -p ../Payload
            cp -R "$APP" ../Payload/
            cd ../Payload
            zip -r ../IOSMirror.ipa IOSMirror.app
            cd ..
            ls -la IOSMirror.ipa
          else
            echo "App not found"
            exit 1
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: IOSMirror
          path: IOSMirror.ipa
          retention-days: 30