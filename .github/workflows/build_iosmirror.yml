name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - new

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: new
          fetch-depth: 1

      - name: Install xcodegen
        run: |
          which xcodegen || brew install xcodegen
          xcodegen --version

      - name: Generate Xcode Project
        run: |
          cd new
          xcodegen generate

      - name: Build (unsigned)
        run: |
          cd new
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO PRODUCT_BUNDLE_IDENTIFIER=com.iosmirror PRODUCT_NAME=IOSMirror 2>&1 | tail -30

      - name: Package as IPA
        run: |
          cd new
          echo "Archive contents:"
          ls -la build/Widget.xarchive/Products/ 2>/dev/null || echo "No Products dir"
          ls -la build/Widget.xarchive/Products/Applications/ 2>/dev/null || echo "No Applications dir"
          
          # Check what app was built
          if [ -d "build/Widget.xarchive/Products/Applications/IOSMirror.app" ]; then
            APP="build/Widget.xarchive/Products/Applications/IOSMirror.app"
            echo "Found IOSMirror.app"
          elif [ -d "build/Widget.xarchive/Products/Applications/Widget.app" ]; then
            APP="build/Widget.xarchive/Products/Applications/Widget.app"
            echo "Found Widget.app"
          else
            echo "App not found - listing all:"
            find build -type d 2>/dev/null
            ls -laR build/ 2>/dev/null
            exit 1
          fi
          
          echo "Using: $APP"
          mkdir -p ../Payload
          cp -R "$APP" ../Payload/
          cd ../Payload
          APP_NAME=$(basename "$APP")
          chmod +x "$APP_NAME"/* 2>/dev/null || true
          zip -r ../IOSMirror.ipa "$APP_NAME"
          cd ..
          ls -la IOSMirror.ipa
          echo "IPA size: $(du -h IOSMirror.ipa | cut -f1)"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: IOSMirror
          path: IOSMirror.ipa
          retention-days: 30