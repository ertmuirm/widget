name: Build New Widget

on:
  push:
    branches:
      - new
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: new
          fetch-depth: 1
      
      - name: List files in new folder
        run: |
          ls -la new/
          ls -la new/App/
          ls -la new/Widget/
      
      - name: Install XcodeGen
        run: |
          brew install xcodegen || true
          xcodegen --version
      
      - name: Generate
        run: |
          cd new
          xcodegen generate
      
      - name: Build
        run: |
          cd new
          xcodebuild -project IOSMirror.xcodeproj \
            -scheme IOSMirror \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.iosmirror \
            build 2>&1
      
      - name: Package as IPA
        if: success()
        run: |
          cd new
          # Find the built app
          APP=$(find build -name "IOSMirror.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP"
          
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            mkdir -p Payload
            cp -R "$APP" Payload/
            cd Payload
            zip -r ../IOSMirror.ipa IOSMirror.app
            cd ..
            ls -la IOSMirror.ipa
          else
            echo "App not found"
            find build -type d 2>/dev/null
          fi
      
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: IOSMirror
          path: new/IOSMirror.ipa
          retention-days: 7