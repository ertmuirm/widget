name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - simple

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Info.plist
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD" >> $GITHUB_OUTPUT
          echo "Building IOSMirror v${VERSION} (${BUILD})"

      - name: Clean previous build artifacts
        run: |
          rm -rf Payload/
          rm -f *.ipa
          rm -f *.zip

      - name: Remove code signatures for Sidestore
        run: |
          rm -rf _CodeSignature
          find . -name "*.strings" -path "*/PlugIns/*" -delete 2>/dev/null || true
          echo "Code signatures removed"

      - name: Package as IPA structure
        run: |
          mkdir -p Payload/IOSMirror.app
          # Copy all app contents (files are in root of repo)
          for item in *; do
            case "$item" in
              .git|.github|Payload|'.trigger'|'.force_push_trigger') ;;
              *) cp -R "$item" Payload/IOSMirror.app/ ;;
            esac
          done
          # Copy hidden files (except .git)
          for item in .[!.]*; do
            case "$item" in
              .git) ;;
              *) cp -R "$item" Payload/IOSMirror.app/ 2>/dev/null || true ;;
            esac
          done
          chmod +x Payload/IOSMirror.app/IOSMirror 2>/dev/null || true
          ls -la Payload/
          echo "Total files in app bundle: $(find Payload/IOSMirror.app -type f | wc -l)"

      - name: Read version for naming
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD=${BUILD}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION} build ${BUILD}"

      - name: Create ZIP archive
        run: |
          cd Payload
          zip -r ../IOSMirror.zip IOSMirror.app
          cd ..
          ls -la IOSMirror.zip
          echo "ZIP size: $(du -h IOSMirror.zip | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IOSMirror-Package
          path: IOSMirror.zip
          retention-days: 30