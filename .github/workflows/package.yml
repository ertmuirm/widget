name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - simple

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            Widgetsmith.app
            Info.plist
          sparse-checkout-cone-mode: false

      - name: List files
        run: |
          echo "Current directory:"
          pwd
          ls -la
          echo ""
          echo "Widgetsmith.app contents:"
          ls -la Widgetsmith.app/ 2>/dev/null || echo "No Widgetsmith.app"

      - name: Package App
        run: |
          mkdir -p Payload/Widgetsmith.app
          # Copy all app contents (files are in root, not Widgetsmith.app folder)
          cp -R * Payload/Widgetsmith.app/ 2>/dev/null || true
          cp -R .[!.]* Payload/Widgetsmith.app/ 2>/dev/null || true
          ls -la Payload/
          ls -la Payload/Widgetsmith.app/ | head -20
          echo "Total files in Payload: $(ls Payload/Widgetsmith.app/ | wc -l)"

      - name: Create ZIP archive
        run: |
          cd Payload
          zip -r ../Widgetsmith.zip Widgetsmith.app
          cd ..
          ls -la Widgetsmith.zip
          echo "ZIP size: $(du -h Widgetsmith.zip | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widgetsmith-Package
          path: Widgetsmith.zip
          retention-days: 7