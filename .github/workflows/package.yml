name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - simple

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List files
        run: |
          echo "Current directory:"
          pwd
          ls -la
          echo ""
          echo "Widgetsmith.app contents:"
          ls -la Widgetsmith.app/ 2>/dev/null || echo "No Widgetsmith.app"

      - name: Package App
        run: |
          mkdir -p Payload/Widgetsmith.app
          # Copy all files/folders except .git, .github, Payload
          for item in * .[!.]*; do
            case "$item" in
              .git|.github|Payload|'.gitignore') ;;
              *) cp -R "$item" Payload/Widgetsmith.app/ 2>/dev/null || true ;;
            esac
          done
          ls -la Payload/
          echo "Total files in Payload: $(find Payload/Widgetsmith.app -type f | wc -l)"
          echo "Total size: $(du -sh Payload/Widgetsmith.app | cut -f1)"

      - name: Create ZIP archive
        run: |
          cd Payload
          zip -r ../Widgetsmith.zip Widgetsmith.app
          cd ..
          ls -la Widgetsmith.zip
          echo "ZIP size: $(du -h Widgetsmith.zip | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widgetsmith-Package
          path: Widgetsmith.zip
          retention-days: 7