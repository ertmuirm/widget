name: Build and Package

on:
  workflow_dispatch:
  push:
    branches:
      - simple

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            Widgetsmith.app
            Info.plist
          sparse-checkout-cone-mode: false

      - name: List files
        run: |
          echo "Current directory:"
          pwd
          ls -la
          echo ""
          echo "Widgetsmith.app contents:"
          ls -la Widgetsmith.app/ 2>/dev/null || echo "No Widgetsmith.app"

      - name: Package App
        run: |
          mkdir -p Payload/Widgetsmith.app
          if [ -d "Widgetsmith.app" ]; then
            cp -R Widgetsmith.app/* Payload/Widgetsmith.app/
          fi
          ls -la Payload/
          ls -la Payload/Widgetsmith.app/